# =====================================================
# 検索設定 — Jackery × 「機材ガチ勢」ニッチ
#   ① 魚群探知機・電動リールを駆使する船釣り/ボート勢
#   ② 機材にこだわる星空観測・天体撮影勢
# どちらも屋外で大電力を使う＝ポータブル電源と相性が極めて高い層。
# =====================================================
# 【クオータ】10,000ユニット/日。search.list=100ユニット/回（≒1日100検索）。
#   1検索は最大50件まで同じ100ユニット → results_per_keyword は 50 が得。
#   消費するのは「検索回数」。ページ送りは1ページ+100なので深追い禁止。
# 【このニッチ特有の注意】
#   母数が小さく投稿頻度も低め（天体は天候・季節依存で不定期）。
#   → 休眠判定(published_within_days)を長めに、登録者下限を低めに設定。
#   → ヒットが薄ければ下限をさらに下げる／上限を広げる方向で調整する。
# =====================================================

region_code: JP
language: ja

results_per_keyword: 50
search_order: relevance

# ニッチは投稿が不定期なので休眠判定を 180 日に緩める（120だと取りこぼす）
published_within_days: 180

# =====================================================
# 検索キーワード（優先度つき・テーマ別）
# tier1 = 「機材ガチ＋電力ニーズ」を最も強く示す語。ここが本命。
# =====================================================
keywords_tier1:        # 最優先：機材こだわり＆電源ニーズの核
  # --- 釣り（電動リール・魚探） ---
  - 電動リール バッテリー        # ど真ん中。電源を探している層
  - 電動リール インプレ
  - 魚群探知機 取り付け
  - GPS魚探
  - 中深場 釣り
  # --- 星空・天体（機材こだわり） ---
  - 電視観望                     # 機材＆電源必須のガチ層
  - 赤道儀 自動導入
  - ポータブル赤道儀
  - 天体撮影 機材

keywords_tier2:        # テーマの中核だがやや広い
  # --- 釣り ---
  - 船釣り
  - 沖釣り
  - ジギング 電動
  - タイラバ
  - ミニボート 釣り
  - ホンデックス                 # 国産魚探ブランド
  - ガーミン 魚探
  # --- 星空・天体 ---
  - 星空撮影
  - 天体観測
  - 星景写真
  - 天体望遠鏡 おすすめ
  - ディープスカイ 撮影

keywords_tier3:        # 拡張・周辺
  - ボート釣り
  - 深場釣り
  - 釣り 装備 こだわり
  - ポタ赤                       # ポータブル赤道儀の俗称
  - 星雲 撮影
  - 天の川 撮影
  - 星空 タイムラプス

# =====================================================
# 除外設定（後段フィルタ：タイトル/説明文/ch名で弾く）
# =====================================================
exclude_title_keywords:
  - 海外
  - 英語
  - 切り抜き
  - ゲーム実況
  - 占い                         # 「星」系で混入する占い/星座占い対策
  - 星座占い
  - スピリチュアル
  - バス釣り                     # 電動リール・魚探の文脈外（淡水ルアー）が多い

# 競合「電源／バッテリー」を扱うチャンネルの印（除外ではなく要確認フラグ）
# 釣り勢は専用リールバッテリー、星空勢はポータブル電源の比較が多い。
competitor_flag_keywords:
  # ポータブル電源系
  - EcoFlow
  - エコフロー
  - BLUETTI
  - ブルーティ
  - Anker
  - アンカー
  - PowerArQ
  # 釣り専用バッテリー系（電動リール用）
  - BMO
  - スーパーリチウム            # ダイワの電動リール用バッテリー
  - 電力丸                       # シマノ系の呼称

# =====================================================
# フィルタ条件（ニッチ向けに下限を緩めに）
# =====================================================
filters:
  subscriber_min: 2000          # ニッチは小規模chが多いので下限を下げる
  subscriber_max: 150000        # この界隈は超大型が少ない。広げたいなら300000
  avg_views_min: 1500           # 直近平均再生数の下限
  engagement_min: 0.03          # 平均再生数÷登録者（ニッチは高めに出やすい）
  min_video_count: 15           # 実績の薄いchを除外（ニッチ考慮でやや緩め）
  active_within_days: 180       # 直近投稿（不定期投稿を取りこぼさない）

# テーマ別のしきい値上書き。
# （ここに書いた項目だけ filters を上書き。テーマは釣り/星空/釣り星空/不明）
theme_overrides:
  # 星空は再生数の多い精鋭だけに絞る
  星空:
    avg_views_min: 10000
  # 釣りは「電子ガジェット（魚探・電動リール等）を使う層」に限定。
  # ch名/説明/ヒット語のいずれかに下記のどれかを含むchだけ残す（電源ニーズの証拠）。
  釣り:
    require_keywords:
      - 電動リール
      - 魚群探知機
      - 魚探
      - GPS魚探
      - 振動子
      - ホンデックス
      - ガーミン
      - ローランス
      - ライブスコープ
      - パノプティクス
      - 電力丸
      - スーパーリチウム
      - BMO
      - 中深場
      - 深場

recent_video_count: 10

# =====================================================
# スコアリング（テーマ適合＝機材ガチ度を重視）
# 機材へのこだわりが命のニッチなので scene_match を厚めに配分。
# =====================================================
scoring_weights:
  scene_match: 35       # tier1（電動リール/魚探/電視観望/赤道儀）ヒットを最重視
  engagement: 30        # 費用対効果
  recent_activity: 20   # 投稿の継続性
  subscriber_fit: 15

# tier1 と tier2/3 の両方にヒット＝そのテーマを深くやっている → 加点
multi_keyword_bonus: true

# =====================================================
# クオータ節約・運用
# =====================================================
cache_enabled: true
cache_ttl_hours: 168
max_searches_per_run: 30

# =====================================================
# 出力
# =====================================================
output_file: jackery_gear_niche_youtubers.xlsx
# 推奨列: チャンネル名 / URL / 登録者数 / 直近平均再生数 / エンゲージ率 /
#   投稿頻度 / テーマ(釣り or 星空) / ヒットしたキーワード /
#   競合バッテリー言及フラグ / 総合スコア / 連絡先(手入力) / 備考(手入力)
